name: Update Greatest Hits Playlist

on:
  # Trigger when individual playlists are updated
  push:
    branches: [main]
    paths:
      - 'docs/*-music-playlist.xml'
      - '!docs/Greatest-Hits-music-playlist.xml'  # Ignore GH itself to prevent loops

  # Weekly fallback (every Sunday at 3 AM UTC)
  schedule:
    - cron: '0 3 * * 0'

  # Allow manual triggering
  workflow_dispatch:

# Serialize runs so concurrent playlist pushes don't race each other on git push.
# cancel-in-progress: false => queued runs wait their turn instead of being dropped.
concurrency:
  group: update-greatest-hits
  cancel-in-progress: false

jobs:
  update-greatest-hits:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Greatest Hits generator
        run: python3 generate_greatest_hits.py

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet docs/Greatest-Hits-music-playlist.xml; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push if changed
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/Greatest-Hits-music-playlist.xml
          git commit -m "Auto-update Greatest Hits playlist - Recomputed from latest playlists"
          # Retry push against a moving remote: another playlist push (or its
          # Greatest Hits run) may land between checkout and push. Rebase our
          # single-file commit on top and try again.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push rejected (attempt $attempt); rebasing on latest main and retrying..."
            git pull --rebase origin main
          done
          echo "::error::Failed to push after 5 attempts"
          exit 1
